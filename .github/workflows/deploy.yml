name: Deploy Website to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: 🎉 Build & Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 🔧 Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 📦 Install dependencies
      run: npm install

    - name: 🏗️ Build Project
      run: npm run build
      env:
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}

    - name: 📂 Install lftp
      run: sudo apt-get install -y lftp

    - name: 📂 Deploy to Hostinger via FTP
      run: |
        lftp -c "
          set ftp:ssl-allow no;
          set net:timeout 30;
          set net:max-retries 3;
          open -u '${{ secrets.FTP_USERNAME }}','${{ secrets.FTP_PASSWORD }}' ftp://${{ secrets.FTP_SERVER }};
          mirror --reverse --delete --ignore-errors --verbose --exclude-glob '.builds' --exclude-glob '.htpasswd' ./dist/ /public_html/;
          bye
        "
